monitorInterval=30

rootLogger.level = INFO
rootLogger.appenderRef.console.ref = ConsoleAppender

appender.console.name = ConsoleAppender
appender.console.type = CONSOLE
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%t] %-60c{1.} - %m%n

# ── Flink internals: quieten to WARN ─────────────────────────────────────────
logger.flink.name = org.apache.flink
logger.flink.level = WARN

logger.akka.name = akka
logger.akka.level = WARN

logger.netty.name = org.apache.flink.shaded.netty4
logger.netty.level = WARN

# ── Kafka / Zookeeper ─────────────────────────────────────────────────────────
logger.kafka.name = org.apache.kafka
logger.kafka.level = WARN

# ── Hadoop S3A (S3 filesystem plugin): too chatty at INFO) ───────────────────
logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = WARN

logger.s3a.name = org.apache.hadoop.fs.s3a
logger.s3a.level = INFO

# ── Job package: full INFO ────────────────────────────────────────────────────
logger.logagent.name = com.logagent
logger.logagent.level = INFO
