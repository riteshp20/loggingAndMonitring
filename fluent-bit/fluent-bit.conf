# ═══════════════════════════════════════════════════════════════════════════════
# Fluent Bit — Production Log Ingestion Configuration
#
# Design goals:
#   • Ingest structured JSON + unstructured plaintext from files and network
#   • Reassemble multi-line stack traces before forwarding
#   • Add canonical metadata (hostname, environment, service_name)
#   • Deliver to Kafka with full disk-backed buffering and backpressure
#   • Never drop data due to Kafka unavailability (filesystem spill)
#
# Environment variables required (see .env.example):
#   KAFKA_BROKERS, ENVIRONMENT, SERVICE_NAME, HOSTNAME
# ═══════════════════════════════════════════════════════════════════════════════

[SERVICE]
    Flush                         1
    Daemon                        Off
    Log_Level                     ${FLB_LOG_LEVEL}
    Log_File                      /var/log/fluent-bit/fluent-bit.log
    Parsers_File                  /fluent-bit/etc/parsers.conf
    HTTP_Server                   On
    HTTP_Listen                   0.0.0.0
    HTTP_Port                     2020
    # Health check endpoint: GET /api/v1/health
    Health_Check                  On
    HC_Errors_Count               5
    HC_Retry_Failure_Count        5
    HC_Period                     5
    # Filesystem-backed buffering — survives Kafka outages and container restarts.
    # Chunks in-memory limit: 128 × ~2 MB chunk ≈ 256 MB RAM ceiling.
    # Backlog (chunks waiting for Kafka) capped at 100 MB of mapped pages.
    storage.path                  /var/log/fluent-bit/storage
    storage.sync                  normal
    storage.checksum              off
    storage.max_chunks_up         128
    storage.backlog.mem_limit     100M

# ─────────────────────────────────────────────────────────────────────────────
# INPUTS
# ─────────────────────────────────────────────────────────────────────────────

# Structured JSON application logs (one JSON object per line).
# Parser handles the record; malformed lines fall back to a "log" key.
[INPUT]
    Name                          tail
    Tag                           file.json.${ENVIRONMENT}.${SERVICE_NAME}
    Path                          /var/log/app/json/*.log
    Path_Key                      source_file
    Parser                        json
    DB                            /var/log/fluent-bit/tail_json.db
    DB.Sync                       Normal
    Buffer_Max_Size               32MB
    Buffer_Chunk_Size             512KB
    Skip_Long_Lines               On
    Refresh_Interval              5
    Rotate_Wait                   30
    Read_from_Head                False
    storage.type                  filesystem
    storage.pause_on_chunks_overlimit  On
    Mem_Buf_Limit                 64MB

# Plaintext / legacy logs.
# Multiline parsers reassemble Java and Python stack traces before the record
# is forwarded to filters. Each assembled block lands in record["log"].
[INPUT]
    Name                          tail
    Tag                           file.plain.${ENVIRONMENT}.${SERVICE_NAME}
    Path                          /var/log/app/plain/*.log
    Path_Key                      source_file
    Multiline.Parser              multiline-java-stack,multiline-python-stack
    DB                            /var/log/fluent-bit/tail_plain.db
    DB.Sync                       Normal
    Buffer_Max_Size               32MB
    Buffer_Chunk_Size             512KB
    Skip_Long_Lines               On
    Refresh_Interval              5
    Rotate_Wait                   30
    Read_from_Head                False
    storage.type                  filesystem
    storage.pause_on_chunks_overlimit  On
    Mem_Buf_Limit                 64MB

# TCP endpoint — accepts JSON objects terminated by newline.
# Used by application SDKs, sidecar proxies, and test tooling.
# Port 5170/TCP.
[INPUT]
    Name                          tcp
    Tag                           tcp.${ENVIRONMENT}.${SERVICE_NAME}
    Listen                        0.0.0.0
    Port                          5170
    Format                        json
    Chunk_Size                    32KB
    Buffer_Size                   64KB
    storage.type                  filesystem
    storage.pause_on_chunks_overlimit  On
    Mem_Buf_Limit                 64MB

# UDP endpoint — fire-and-forget; appropriate for metrics-adjacent log lines
# where occasional loss is acceptable. Port 5171/UDP.
# Note: each UDP datagram must fit within a single packet (<65 KB).
[INPUT]
    Name                          udp
    Tag                           udp.${ENVIRONMENT}.${SERVICE_NAME}
    Listen                        0.0.0.0
    Port                          5171
    Format                        json
    Chunk_Size                    32KB
    Buffer_Size                   64KB
    storage.type                  filesystem
    Mem_Buf_Limit                 32MB

# Syslog endpoint — RFC 5424 over TCP. Port 5140/TCP.
# Useful for infrastructure components (nginx, haproxy, kernel) that emit syslog.
[INPUT]
    Name                          syslog
    Tag                           syslog.${ENVIRONMENT}.${SERVICE_NAME}
    Listen                        0.0.0.0
    Port                          5140
    Mode                          tcp
    Parser                        syslog-rfc5424
    storage.type                  filesystem
    storage.pause_on_chunks_overlimit  On
    Mem_Buf_Limit                 32MB

# ─────────────────────────────────────────────────────────────────────────────
# FILTERS  (applied in order)
# ─────────────────────────────────────────────────────────────────────────────

# 1. Normalise schema: unify JSON-sourced and plaintext-sourced records into
#    a single canonical layout (see lua/normalize.lua for the output schema).
[FILTER]
    Name                          lua
    Match                         *
    script                        /fluent-bit/etc/lua/normalize.lua
    call                          normalize

# 2. Stamp every record with static infrastructure metadata.
#    These fields are set AFTER Lua normalisation so they cannot be overwritten
#    by user-supplied log data.
[FILTER]
    Name                          record_modifier
    Match                         *
    Record                        hostname       ${HOSTNAME}
    Record                        environment    ${ENVIRONMENT}
    Record                        service_name   ${SERVICE_NAME}
    Record                        agent_version  1.0.0

# 3. Drop DEBUG records in production to reduce volume.
#    Remove or change the match tag to keep DEBUG in staging/local.
[FILTER]
    Name                          grep
    Match                         *.prod.*
    Exclude                       log_level DEBUG

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUT — Kafka
# ─────────────────────────────────────────────────────────────────────────────
#
# Delivery guarantees:
#   • Retry_Limit False          — Fluent Bit retries the chunk indefinitely
#   • storage.type filesystem    — chunks survive container restarts
#   • rdkafka.acks=1             — leader-only ack; optimal for log throughput
#   • rdkafka.retries=5          — rdkafka-level retries per delivery attempt
#   • rdkafka.message.timeout.ms — hard cap per message; prevents stale retries
#
# Throughput tuning:
#   • batch.num.messages=10000   — coalesce up to 10K msgs per Kafka batch
#   • queue.buffering.max.ms=50  — max 50ms batching latency
#   • compression.codec=lz4      — ~4× size reduction, low CPU cost
#
[OUTPUT]
    Name                                        kafka
    Match                                       *
    Brokers                                     ${KAFKA_BROKERS}
    Topics                                      raw-logs
    Timestamp_Key                               @timestamp
    Timestamp_Format                            iso8601
    Retry_Limit                                 False
    # rdkafka producer tuning
    rdkafka.request.required.acks               1
    rdkafka.retries                             5
    rdkafka.retry.backoff.ms                    500
    rdkafka.retry.backoff.max.ms                30000
    rdkafka.message.timeout.ms                  300000
    rdkafka.queue.buffering.max.messages        100000
    rdkafka.queue.buffering.max.kbytes          1048576
    rdkafka.queue.buffering.max.ms              50
    rdkafka.batch.num.messages                  10000
    rdkafka.message.max.bytes                   1048576
    rdkafka.compression.codec                   lz4
    rdkafka.socket.keepalive.enable             true
    rdkafka.socket.timeout.ms                   30000
    rdkafka.log.connection.close                false
    rdkafka.delivery.report.only.error          true
    rdkafka.metadata.request.timeout.ms         30000
