global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

# ── Alerting rules ────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/rules/*.yml

# ── Alertmanager ──────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: [ "alertmanager:9093" ]
      timeout: 10s

# ── Scrape targets ────────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: [ "localhost:9090" ]

  # ── anomaly-detector (Phase 2 pipeline) ──────────────────────────────────
  # Metrics: events_ingested_total, processing_latency_seconds,
  #          kafka_consumer_lag, anomalies_detected_total,
  #          model_inference_latency_seconds, suppressed_alerts_total
  - job_name: anomaly-detector
    static_configs:
      - targets: [ "anomaly-detector:9100" ]
        labels:
          service: anomaly-detector

  # ── incident-reporter (Phase 3 + 4 pipeline) ─────────────────────────────
  # Metrics: alerts_sent_total, alerts_suppressed_total,
  #          pagerduty_api_errors_total, report_pipeline_latency_seconds,
  #          reports_generated_total
  - job_name: incident-reporter
    static_configs:
      - targets: [ "incident-reporter:9101" ]
        labels:
          service: incident-reporter

  # ── dashboard API (Phase 5) ───────────────────────────────────────────────
  # Metrics: http_request_duration_seconds, http_requests_total,
  #          http_errors_total, active_sse_connections
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: [ "api:8000" ]
        labels:
          service: api
