# ─────────────────────────────────────────────────────────────────────────────
# Scheduled secrets audit
#
# Runs nightly and on every push to main.
# Scans the full git history — catches secrets that may have been committed
# months ago and are still live in the history.
# ─────────────────────────────────────────────────────────────────────────────
name: Secrets audit

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC nightly
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # upload SARIF to GitHub Security tab

jobs:
  trufflehog-full:
    name: TruffleHog — full history
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@v3.95.2
        with:
          extra_args: >-
            --only-verified
            --fail

  gitleaks-full:
    name: Gitleaks — full history
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --source . --log-opts="--all" --report-format sarif --report-path gitleaks.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif

  dependency-audit:
    name: Dependency audit / ${{ matrix.service }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: anomaly-detector
            dir: anomaly-detector
            type: python
          - service: incident-reporter
            dir: incident-reporter
            type: python
          - service: api
            dir: api
            type: python
          - service: flink-log-processor
            dir: flink-log-processor
            type: java

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        if: matrix.type == 'python'
        with:
          python-version: "3.12"

      - name: pip-audit (Python)
        if: matrix.type == 'python'
        working-directory: ${{ matrix.dir }}
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --output-format json \
            --ignore-vuln GHSA-jfh8-c2jp-jgg    # example known false positive
        continue-on-error: false

      - uses: actions/setup-java@v5
        if: matrix.type == 'java'
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: OWASP dependency-check (Java)
        if: matrix.type == 'java'
        working-directory: ${{ matrix.dir }}
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            --batch-mode -q

  terraform-security:
    name: Terraform security scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1
        with:
          working_directory: terraform/
          format: sarif
          soft_fail: false

      - name: Checkov — IaC policy check
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: false

      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov.sarif
