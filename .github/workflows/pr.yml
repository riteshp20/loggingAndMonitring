# ─────────────────────────────────────────────────────────────────────────────
# Pull Request pipeline
#
# Runs on every PR targeting main:
#   secrets-scan → lint → unit-tests → integration-tests → docker-build
#
# All jobs are independent where possible and run in parallel.
# The docker-build job is the final gate — it proves images compile but
# does NOT push (no registry credentials on PRs from forks).
# ─────────────────────────────────────────────────────────────────────────────
name: PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # for posting test-summary comments

env:
  PYTHON_VERSION: "3.12"
  JAVA_VERSION: "17"

jobs:

  # ── 1. Secrets scanning ───────────────────────────────────────────────────
  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so TruffleHog scans all commits in the PR

      - name: TruffleHog — scan PR commits
        uses: trufflesecurity/trufflehog@v3.95.2
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: >-
            --only-verified
            --fail

      - name: Gitleaks — detect hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Lint ───────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linters
        run: pip install ruff==0.4.4 mypy==1.10.0 types-redis

      - name: Ruff — lint + format check (anomaly-detector)
        run: ruff check anomaly-detector/ && ruff format --check anomaly-detector/

      - name: Ruff — lint + format check (incident-reporter)
        run: ruff check incident-reporter/ && ruff format --check incident-reporter/

      - name: Ruff — lint + format check (api)
        run: ruff check api/ && ruff format --check api/

      - name: Mypy — type-check api
        working-directory: api
        run: |
          pip install -r requirements.txt
          mypy . --ignore-missing-imports --exclude tests/

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Checkstyle — Flink processor
        working-directory: flink-log-processor
        run: mvn checkstyle:check --batch-mode -q

      - name: Terraform fmt
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.8.4"

      - run: terraform fmt -check -recursive terraform/

      - name: Helm lint
        run: |
          curl -sSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm lint k8s/helm/log-monitor/

  # ── 3. Unit tests ─────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests / ${{ matrix.service }}
    runs-on: ubuntu-24.04
    needs: secrets-scan
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: anomaly-detector
            working_directory: anomaly-detector
            test_cmd: python -m pytest tests/ -v --tb=short --junitxml=test-results.xml --cov=. --cov-report=xml
          - service: incident-reporter
            working_directory: incident-reporter
            test_cmd: python -m pytest tests/ -v --tb=short --junitxml=test-results.xml --cov=. --cov-report=xml
          - service: flink-processor
            working_directory: flink-log-processor
            test_cmd: mvn test --batch-mode

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        if: matrix.service != 'flink-processor'
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        if: matrix.service != 'flink-processor'
        working-directory: ${{ matrix.working_directory }}
        run: pip install -r requirements.txt pytest-cov

      - uses: actions/setup-java@v5
        if: matrix.service == 'flink-processor'
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests
        working-directory: ${{ matrix.working_directory }}
        run: ${{ matrix.test_cmd }}

      - name: Upload test results
        if: always() && matrix.service != 'flink-processor'
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.service }}
          path: ${{ matrix.working_directory }}/test-results.xml

      - name: Upload coverage
        if: matrix.service != 'flink-processor'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.working_directory }}/coverage.xml

  # ── 4. Coverage gate ──────────────────────────────────────────────────────
  coverage-report:
    name: Coverage report
    runs-on: ubuntu-24.04
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6

      - name: Download coverage reports
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Post coverage comment
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "*.xml"
          fail_ci_if_error: false
          comment: true

  # ── 5. Integration tests ──────────────────────────────────────────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-24.04
    needs: unit-tests
    timeout-minutes: 20

    services:
      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # Kafka via KRaft in a single container — fast (~15 s to ready)
      - name: Start Kafka (KRaft)
        run: |
          docker run -d \
            --name kafka \
            -p 9092:9092 \
            -e KAFKA_CFG_NODE_ID=1 \
            -e KAFKA_CFG_PROCESS_ROLES=broker,controller \
            -e KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093 \
            -e KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093 \
            -e KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092 \
            -e KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT \
            -e KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER \
            -e KAFKA_KRAFT_CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk \
            -e ALLOW_PLAINTEXT_LISTENER=yes \
            --network host \
            bitnami/kafka:3.7

          # Wait for broker readiness
          timeout 60 bash -c 'until docker exec kafka kafka-broker-api-versions.sh \
            --bootstrap-server localhost:9092 >/dev/null 2>&1; do sleep 2; done'

      # OpenSearch single-node
      - name: Start OpenSearch
        run: |
          docker run -d \
            --name opensearch \
            -p 9200:9200 \
            -e discovery.type=single-node \
            -e OPENSEARCH_JAVA_OPTS="-Xms256m -Xmx256m" \
            -e DISABLE_SECURITY_PLUGIN=true \
            opensearchproject/opensearch:2.13.0

          timeout 90 bash -c 'until curl -sf http://localhost:9200/_cluster/health \
            | grep -qE "\"status\":\"(green|yellow)\""; do sleep 3; done'

      - name: Create Kafka topics
        run: |
          docker exec kafka kafka-topics.sh \
            --bootstrap-server localhost:9092 --create \
            --topic raw-logs --partitions 3 --replication-factor 1
          docker exec kafka kafka-topics.sh \
            --bootstrap-server localhost:9092 --create \
            --topic processed-logs --partitions 3 --replication-factor 1
          docker exec kafka kafka-topics.sh \
            --bootstrap-server localhost:9092 --create \
            --topic anomaly-events --partitions 3 --replication-factor 1

      - name: Install anomaly-detector deps
        working-directory: anomaly-detector
        run: pip install -r requirements.txt pytest-cov

      - name: Install incident-reporter deps
        working-directory: incident-reporter
        run: pip install -r requirements.txt pytest-cov

      - name: Integration tests — anomaly-detector pipeline
        working-directory: anomaly-detector
        env:
          KAFKA_BROKERS: localhost:9092
          REDIS_URL: redis://localhost:6379
          KAFKA_INPUT_TOPIC: processed-logs
          KAFKA_ANOMALY_TOPIC: anomaly-events
        run: >-
          python -m pytest tests/ -v --tb=short
          -k "integration or pipeline"
          --junitxml=integration-results.xml

      - name: Integration tests — incident-reporter pipeline
        working-directory: incident-reporter
        env:
          KAFKA_BROKERS: localhost:9092
          OPENSEARCH_URL: http://localhost:9200
          REDIS_URL: redis://localhost:6379
          KAFKA_ANOMALY_TOPIC: anomaly-events
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}
        run: >-
          python -m pytest tests/test_pipeline.py tests/test_enrichment.py
          tests/test_storage.py -v --tb=short
          --junitxml=integration-results.xml

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: "*/integration-results.xml"

  # ── 6. Docker build (no push) ─────────────────────────────────────────────
  docker-build:
    name: Docker build / ${{ matrix.service }}
    runs-on: ubuntu-24.04
    needs: [lint, unit-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: anomaly-detector
            context: anomaly-detector
          - service: incident-reporter
            context: incident-reporter
          - service: api
            context: api
          - service: flink-log-processor
            context: flink-log-processor
          - service: fluent-bit
            context: fluent-bit

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build image (cache only, no push)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: false
          tags: log-monitor/${{ matrix.service }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max
          # Fail on any build warning that would become an error in prod
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: log-monitor/${{ matrix.service }}:pr-${{ github.event.pull_request.number }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  # ── 7. PR summary ─────────────────────────────────────────────────────────
  pr-summary:
    name: PR gate
    runs-on: ubuntu-24.04
    needs: [secrets-scan, lint, unit-tests, integration-tests, docker-build]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results" | jq -r 'to_entries[] | "\(.key): \(.value.result)"'
          if echo "$results" | jq -e 'to_entries[] | select(.value.result != "success")' > /dev/null; then
            echo "❌ One or more required jobs failed"
            exit 1
          fi
          echo "✅ All checks passed"
