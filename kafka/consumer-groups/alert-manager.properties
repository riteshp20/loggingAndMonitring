# ═══════════════════════════════════════════════════════════════════════════════
# Consumer group: alert-manager-v1
#
# Role     : Reads anomaly-events; deduplicates; fans out to PagerDuty,
#            Slack, and webhooks; writes sent alerts to alert-notifications.
# Topic    : anomaly-events (6 partitions)
# Parallelism: up to 6 consumer instances
# Latency target: anomaly → alert < 5 seconds end-to-end
#
# Design priority: LOW LATENCY, not throughput.
# Volume is << 1 % of raw-logs.  The tuning here is the inverse of the
# stream-processor: small batches, no minimum fetch wait, fast session timeout.
# ═══════════════════════════════════════════════════════════════════════════════

bootstrap.servers=kafka-1:9092,kafka-2:9092,kafka-3:9092
group.id=alert-manager-v1

partition.assignment.strategy=org.apache.kafka.clients.consumer.CooperativeStickyAssignor

enable.auto.commit=false

# ── Session / heartbeat ───────────────────────────────────────────────────────
# Tighter session timeout (45 s) than stream-processor: we want fast detection
# if an alert-manager instance is stuck calling a slow external webhook.
session.timeout.ms=45000
heartbeat.interval.ms=3000

# 120 s is enough headroom for a slow PagerDuty/Slack API call (typically < 2 s)
# without false evictions.
max.poll.interval.ms=120000

# ── Batch sizing ──────────────────────────────────────────────────────────────
# Small batches: process alerts immediately, don't wait for 500+ records to
# accumulate.  At normal anomaly rates (< 10/min) this is almost always 1–5
# records per poll.  Larger batches would only add unnecessary latency.
max.poll.records=50

# ── Fetch tuning ──────────────────────────────────────────────────────────────
# fetch.min.bytes=1: return to the consumer immediately when ANY data is
# available.  This is the key latency knob — set to 1 for alert workloads.
# The stream-processor sets this to 1 MB to batch aggressively; alert-manager
# sets it to 1 to send alerts the moment they arrive.
fetch.min.bytes=1

# fetch.max.wait.ms=100: broker waits at most 100 ms for fetch.min.bytes.
# Since min=1, this is effectively the maximum extra latency added by the
# fetch layer.  100 ms << 5 s latency target.
fetch.max.wait.ms=100

fetch.max.bytes=1048576
max.partition.fetch.bytes=524288

# ── Offset management ─────────────────────────────────────────────────────────
# Commit only after the alert has been sent to ALL configured channels
# (PagerDuty + Slack).  An uncommitted offset means the alert will be re-sent
# on restart, which is safe (idempotency is enforced by the dedup window in the
# alert-manager using a Redis/in-memory TTL keyed on anomaly fingerprint).
auto.offset.reset=earliest
isolation.level=read_committed

# ── Network ───────────────────────────────────────────────────────────────────
receive.buffer.bytes=32768
send.buffer.bytes=32768
request.timeout.ms=15000
retry.backoff.ms=500
reconnect.backoff.ms=250
reconnect.backoff.max.ms=5000
