# ═══════════════════════════════════════════════════════════════════════════════
# Consumer group: stream-processor-v1
#
# Role     : Reads raw-logs, enriches/normalises, writes to processed-logs
# Topic    : raw-logs (24 partitions)
# Parallelism: 24 consumer instances recommended (one per partition)
# Throughput target: 100 000 events/sec sustained
#
# Versioning note
# ───────────────
# The -v1 suffix enables blue/green upgrades: start stream-processor-v2 from
# the latest offset, let it warm up, then stop v1.  Both groups can consume
# concurrently without interfering because Kafka consumer groups are independent.
# ═══════════════════════════════════════════════════════════════════════════════

bootstrap.servers=kafka-1:9092,kafka-2:9092,kafka-3:9092
group.id=stream-processor-v1

# ── Partition assignment ──────────────────────────────────────────────────────
# CooperativeStickyAssignor performs *incremental* rebalancing: only the
# partitions that must move are revoked, not all of them.  This eliminates the
# "stop-the-world" pause that EagerAssignor causes when a single instance is
# added or replaced during a rolling deploy across 24 partitions.
partition.assignment.strategy=org.apache.kafka.clients.consumer.CooperativeStickyAssignor

# ── Offset management ─────────────────────────────────────────────────────────
# Disable auto-commit: the processor commits offsets only after the enriched
# record has been successfully written to processed-logs.  Auto-commit would
# mark records as processed even when the downstream write failed.
enable.auto.commit=false

# ── Session / heartbeat ───────────────────────────────────────────────────────
# session.timeout.ms: Kafka declares the consumer dead and triggers a rebalance
# if it receives no heartbeat within this window.  60 s is generous enough for
# GC pauses and transient network blips without causing spurious rebalances.
session.timeout.ms=60000

# heartbeat.interval.ms must be ≤ session.timeout.ms / 3.
# 3 s sends ~20 heartbeats before the session would expire.
heartbeat.interval.ms=3000

# max.poll.interval.ms: the maximum time between two consecutive poll() calls.
# If the processor is still working through a batch when this elapses, Kafka
# removes it from the group.  5 min accommodates slow downstream writes and
# brief back-pressure without false positives.
max.poll.interval.ms=300000

# ── Batch sizing ──────────────────────────────────────────────────────────────
# 500 records/poll × ~500 B/record = ~250 KB/poll per consumer instance.
# Larger batches increase throughput but lengthen commit latency.
# At 100 K events/sec across 24 instances, each instance handles ~4 200 events/sec;
# 500 records/poll means ~8 polls/sec which is well within Kafka's capability.
max.poll.records=500

# ── Fetch tuning ──────────────────────────────────────────────────────────────
# fetch.max.bytes: cap on total data returned per fetch request across all
# assigned partitions.  50 MB prevents a single slow partition from starving
# fast ones by holding an oversized fetch buffer.
fetch.max.bytes=52428800

# fetch.min.bytes: broker waits until this many bytes are available before
# responding.  1 MB reduces round-trips at high throughput; set to 1 if you
# need lower latency at low throughput.
fetch.min.bytes=1048576

# fetch.max.wait.ms: max time the broker waits for fetch.min.bytes.
# 500 ms is a safe upper bound; latency-sensitive deployments can lower to 100 ms.
fetch.max.wait.ms=500

# max.partition.fetch.bytes: per-partition cap on a single fetch response.
# 10 MB keeps memory bounded when a partition is heavily backlogged.
max.partition.fetch.bytes=10485760

# ── Offset reset ─────────────────────────────────────────────────────────────
# earliest: new groups start from the oldest available offset so no records
# are skipped on first deployment.  Change to "latest" for canary groups.
auto.offset.reset=earliest

# ── Isolation level ───────────────────────────────────────────────────────────
# read_committed: skip uncommitted transactional messages and control records.
# This is a no-op today (Fluent Bit does not use transactions) but is free to
# enable and future-proofs the consumer for exactly-once stream processing.
isolation.level=read_committed

# ── Network ───────────────────────────────────────────────────────────────────
receive.buffer.bytes=65536
send.buffer.bytes=131072
request.timeout.ms=30000
retry.backoff.ms=1000
reconnect.backoff.ms=500
reconnect.backoff.max.ms=10000
