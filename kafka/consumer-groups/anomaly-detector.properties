# ═══════════════════════════════════════════════════════════════════════════════
# Consumer group: anomaly-detector-v1
#
# Role     : Reads processed-logs; maintains rolling time-windows per
#            (service_name × log_level); emits to anomaly-events when a
#            statistical threshold is crossed.
# Topic    : processed-logs (12 partitions)
# Parallelism: 12 consumer instances (one per partition)
#
# Processing model
# ────────────────
# The detector uses tumbling 5-minute windows keyed by service_name.
# Each consumer instance owns a contiguous set of partitions, so window
# state stays local to one JVM process — no distributed state store needed
# at this scale.  A partition reassignment forces a window flush, which is
# safe because windows are commutative (partial counts can be merged).
# ═══════════════════════════════════════════════════════════════════════════════

bootstrap.servers=kafka-1:9092,kafka-2:9092,kafka-3:9092
group.id=anomaly-detector-v1

partition.assignment.strategy=org.apache.kafka.clients.consumer.CooperativeStickyAssignor

enable.auto.commit=false

# ── Session / heartbeat ───────────────────────────────────────────────────────
session.timeout.ms=60000
heartbeat.interval.ms=3000

# max.poll.interval.ms is generous here because:
#   - The detector may need to flush a window to Kafka (anomaly-events) before
#     polling again.  Window flush can involve an upstream write + ack roundtrip.
#   - 10 min provides headroom for slow anomaly-events producers without false
#     consumer evictions.
max.poll.interval.ms=600000

# ── Batch sizing ──────────────────────────────────────────────────────────────
# 1 000 records/poll: the detector processes more records per pass than the
# stream-processor because its computation (bucket increment + threshold check)
# is cheaper than enrichment + Kafka produce.
max.poll.records=1000

# ── Fetch tuning ──────────────────────────────────────────────────────────────
# Mirrors stream-processor settings — same topic throughput class.
fetch.max.bytes=52428800
fetch.min.bytes=1048576
fetch.max.wait.ms=500
max.partition.fetch.bytes=10485760

# ── Offset management ─────────────────────────────────────────────────────────
# Offsets are committed after window data is persisted (in-memory state +
# anomaly-events write).  In the event of a crash, the consumer replays the
# window from the last committed offset, which is safe because incrementing
# counts are idempotent when replayed within the same window interval.
auto.offset.reset=earliest
isolation.level=read_committed

# ── Network ───────────────────────────────────────────────────────────────────
receive.buffer.bytes=65536
send.buffer.bytes=131072
request.timeout.ms=30000
retry.backoff.ms=1000
reconnect.backoff.ms=500
reconnect.backoff.max.ms=10000
