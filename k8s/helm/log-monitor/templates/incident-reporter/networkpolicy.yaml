apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: incident-reporter-netpol
  namespace: {{ include "log-monitor.namespace" . }}
  labels:
    {{- include "log-monitor.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "log-monitor.selectorLabels" (dict "component" "incident-reporter" "root" .) | nindent 6 }}
  policyTypes: [Egress]
  egress:
    - ports:
        - port: 9092
      to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka
    - ports:
        - port: 9200
      to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: opensearch
    - ports:
        - port: 6379
      to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
    # Anthropic API + Slack + PagerDuty are external HTTPS
    - ports:
        - port: 443
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
