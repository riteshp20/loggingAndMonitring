apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-netpol
  namespace: {{ include "log-monitor.namespace" . }}
  labels:
    {{- include "log-monitor.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "log-monitor.selectorLabels" (dict "component" "api" "root" .) | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    # Accept traffic from the ingress controller and any pod in the namespace
    - ports:
        - port: 8000
  egress:
    - ports:
        - port: 9092
      to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka
    - ports:
        - port: 9200
      to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: opensearch
    - ports:
        - port: 6379
      to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
