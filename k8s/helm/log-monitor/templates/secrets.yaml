# All sensitive credentials live in a single Secret.
# In production, populate via:
#   helm upgrade ... --set secrets.anthropicApiKey=$KEY --set secrets.jwtSecret=$SECRET
# Or use external-secrets / sealed-secrets and remove this template.
apiVersion: v1
kind: Secret
metadata:
  name: log-monitor-secrets
  namespace: {{ include "log-monitor.namespace" . }}
  labels:
    {{- include "log-monitor.labels" . | nindent 4 }}
type: Opaque
stringData:
  anthropic-api-key:      {{ required "secrets.anthropicApiKey is required" .Values.secrets.anthropicApiKey | quote }}
  jwt-secret:             {{ required "secrets.jwtSecret is required" .Values.secrets.jwtSecret | quote }}
  opensearch-username:    {{ .Values.secrets.opensearchUsername | quote }}
  opensearch-password:    {{ .Values.secrets.opensearchPassword | quote }}
  slack-bot-token:        {{ .Values.secrets.slackBotToken | quote }}
  pagerduty-routing-key:  {{ .Values.secrets.pagerdutyRoutingKey | quote }}
