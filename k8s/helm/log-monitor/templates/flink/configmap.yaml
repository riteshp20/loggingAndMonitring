apiVersion: v1
kind: ConfigMap
metadata:
  name: flink-config
  namespace: {{ include "log-monitor.namespace" . }}
  labels:
    {{- include "log-monitor.labels" . | nindent 4 }}
data:
  flink-conf.yaml: |
    jobmanager.rpc.address: flink-jobmanager
    jobmanager.rpc.port: 6123
    jobmanager.memory.process.size: {{ .Values.flink.jobmanager.resources.limits.memory }}
    taskmanager.memory.process.size: {{ .Values.flink.taskmanager.resources.limits.memory }}
    taskmanager.numberOfTaskSlots: {{ .Values.flink.taskmanager.taskSlots }}
    parallelism.default: {{ .Values.flink.job.parallelism }}
    state.backend: rocksdb
    state.checkpoints.dir: file:///flink-checkpoints
    execution.checkpointing.interval: {{ .Values.flink.job.checkpointIntervalMs }}
    execution.checkpointing.mode: EXACTLY_ONCE
    execution.checkpointing.min-pause: 30000
    heartbeat.interval: 10000
    heartbeat.timeout: 50000
    rest.port: 8081
    rest.flamegraph.enabled: true
    metrics.reporter.slf4j.class: org.apache.flink.metrics.slf4j.Slf4jReporter
    metrics.reporter.slf4j.interval: 60 SECONDS
  log4j-console.properties: |
    rootLogger.level = INFO
    rootLogger.appenderRef.console.ref = ConsoleAppender
    appender.console.name = ConsoleAppender
    appender.console.type = CONSOLE
    appender.console.layout.type = PatternLayout
    appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p %-60c %x - %m%n
