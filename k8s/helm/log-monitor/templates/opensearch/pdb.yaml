apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: opensearch-pdb
  namespace: {{ include "log-monitor.namespace" . }}
  labels:
    {{- include "log-monitor.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.opensearch.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "log-monitor.selectorLabels" (dict "component" "opensearch" "root" .) | nindent 6 }}
