apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: {{ include "log-monitor.namespace" . }}
  labels:
    {{- include "log-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/name: opensearch
spec:
  serviceName: opensearch-headless
  replicas: {{ .Values.opensearch.replicas }}
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "log-monitor.selectorLabels" (dict "component" "opensearch" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "log-monitor.podLabels" (dict "component" "opensearch" "root" .) | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true
      terminationGracePeriodSeconds: 120
      initContainers:
        # OpenSearch requires vm.max_map_count ≥ 262144
        - name: sysctl
          image: busybox:1.36
          securityContext:
            privileged: true
            runAsUser: 0
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "log-monitor.selectorLabels" (dict "component" "opensearch" "root" .) | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      containers:
        - name: opensearch
          image: {{ .Values.opensearch.image }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 9200
            - name: transport
              containerPort: 9300
          env:
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: cluster.name
              value: log-monitor-opensearch
            - name: node.name
              value: "$(MY_POD_NAME)"
            - name: discovery.seed_hosts
              value: opensearch-headless
            - name: cluster.initial_master_nodes
              value: >-
                {{- $nodes := list -}}
                {{- range $i, $e := until (int .Values.opensearch.replicas) -}}
                {{- $nodes = append $nodes (printf "opensearch-%d" $i) -}}
                {{- end -}}
                {{ join "," $nodes }}
            - name: OPENSEARCH_JAVA_OPTS
              value: {{ .Values.opensearch.javaOpts | quote }}
            - name: DISABLE_SECURITY_PLUGIN
              value: {{ .Values.opensearch.disableSecurity | quote }}
            - name: OPENSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: log-monitor-secrets
                  key: opensearch-username
                  optional: true
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: log-monitor-secrets
                  key: opensearch-password
                  optional: true
          livenessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_cluster/health?wait_for_status=yellow&timeout=5s
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            {{- toYaml .Values.opensearch.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        {{- if .Values.opensearch.storage.storageClass }}
        storageClassName: {{ .Values.opensearch.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.opensearch.storage.size }}
