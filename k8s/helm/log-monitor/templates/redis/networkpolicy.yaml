apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-netpol
  namespace: {{ include "log-monitor.namespace" . }}
  labels:
    {{- include "log-monitor.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "log-monitor.selectorLabels" (dict "component" "redis" "root" .) | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    - ports:
        - port: 6379
      from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: anomaly-detector
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: incident-reporter
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
