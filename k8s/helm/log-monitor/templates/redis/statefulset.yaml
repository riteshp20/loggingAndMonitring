apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: {{ include "log-monitor.namespace" . }}
  labels:
    {{- include "log-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/name: redis
spec:
  serviceName: redis
  replicas: {{ .Values.redis.replicas }}
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "log-monitor.selectorLabels" (dict "component" "redis" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "log-monitor.podLabels" (dict "component" "redis" "root" .) | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsNonRoot: true
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          command:
            - redis-server
            - --maxmemory
            - {{ .Values.redis.maxmemory | quote }}
            - --maxmemory-policy
            - allkeys-lru
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - name: redis
              containerPort: 6379
          livenessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        {{- if .Values.redis.storage.storageClass }}
        storageClassName: {{ .Values.redis.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ include "log-monitor.namespace" . }}
  labels:
    {{- include "log-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/name: redis
spec:
  clusterIP: None
  selector:
    {{- include "log-monitor.selectorLabels" (dict "component" "redis" "root" .) | nindent 4 }}
  ports:
    - name: redis
      port: 6379
