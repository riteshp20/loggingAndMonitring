# Default-deny all ingress and egress within the namespace.
# Each component's own NetworkPolicy opens only the ports it needs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ include "log-monitor.namespace" . }}
  labels:
    {{- include "log-monitor.labels" . | nindent 4 }}
spec:
  podSelector: {}          # matches every pod in the namespace
  policyTypes: [Ingress, Egress]
