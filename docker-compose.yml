# ═══════════════════════════════════════════════════════════════════════════════
# Log Monitoring Agent — Full Local Stack
#
# Phase 1  Ingestion        Fluent Bit → Kafka (raw-logs)
# Phase 2  Stream proc.     Flink → processed-logs → anomaly-detector → anomaly-events
# Phase 3  AI reports       incident-reporter → OpenSearch (incident-reports)
# Phase 4  Alert routing    incident-reporter → Slack / PagerDuty
# API      Dashboard        FastAPI (api) serves /api/*
#
# Quick start:
#   cp .env.example .env          # fill in ANTHROPIC_API_KEY + JWT_SECRET
#   docker compose up --build -d
# ═══════════════════════════════════════════════════════════════════════════════

version: "3.9"

# ── Shared YAML anchors ────────────────────────────────────────────────────────

x-restart: &restart
  restart: unless-stopped

x-kafka-common: &kafka-common
  image: bitnami/kafka:3.7
  <<: *restart
  networks:
    - monitoring
  environment: &kafka-env
    KAFKA_KRAFT_CLUSTER_ID:                        "MkU3OEVBNTcwNTJENDM2Qk"
    KAFKA_CFG_PROCESS_ROLES:                       "broker,controller"
    KAFKA_CFG_CONTROLLER_QUORUM_VOTERS:            "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
    KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP:      "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
    KAFKA_CFG_CONTROLLER_LISTENER_NAMES:           "CONTROLLER"
    KAFKA_CFG_INTER_BROKER_LISTENER_NAME:          "PLAINTEXT"
    KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE:           "false"
    KAFKA_CFG_DEFAULT_REPLICATION_FACTOR:          "3"
    KAFKA_CFG_MIN_INSYNC_REPLICAS:                 "2"
    KAFKA_CFG_NUM_PARTITIONS:                      "12"
    KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR:    "3"
    KAFKA_CFG_OFFSETS_TOPIC_NUM_PARTITIONS:        "50"
    KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
    KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR:       "2"
    KAFKA_CFG_LOG_RETENTION_HOURS:                 "168"
    KAFKA_CFG_LOG_RETENTION_BYTES:                 "-1"
    KAFKA_CFG_LOG_SEGMENT_BYTES:                   "536870912"
    KAFKA_CFG_LOG_SEGMENT_MS:                      "3600000"
    KAFKA_CFG_SOCKET_REQUEST_MAX_BYTES:            "104857600"
    KAFKA_CFG_MESSAGE_MAX_BYTES:                   "1048576"
    KAFKA_CFG_REPLICA_FETCH_MAX_BYTES:             "1048576"
    KAFKA_CFG_NUM_IO_THREADS:                      "8"
    KAFKA_CFG_NUM_NETWORK_THREADS:                 "3"
    KAFKA_CFG_SOCKET_SEND_BUFFER_BYTES:            "102400"
    KAFKA_CFG_SOCKET_RECEIVE_BUFFER_BYTES:         "102400"
    KAFKA_CFG_GROUP_INITIAL_REBALANCE_DELAY_MS:    "3000"
    KAFKA_CFG_GROUP_MAX_SESSION_TIMEOUT_MS:        "300000"
    KAFKA_CFG_UNCLEAN_LEADER_ELECTION_ENABLE:      "false"
    ALLOW_PLAINTEXT_LISTENER:                      "yes"
  healthcheck:
    test:
      - CMD-SHELL
      - kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1
    interval: 10s
    timeout: 15s
    retries: 18
    start_period: 45s

# Flink JobManager / TaskManager share most env vars
x-flink-common: &flink-common
  image: flink:1.18.1-scala_2.12-java17
  <<: *restart
  networks:
    - monitoring
  environment:
    # JVM heap — tune via .env if you have more RAM available
    FLINK_PROPERTIES: |
      jobmanager.rpc.address: flink-jobmanager
      taskmanager.numberOfTaskSlots: 4
      parallelism.default: 2
      state.backend: rocksdb
      state.checkpoints.dir: file:///flink-checkpoints
      execution.checkpointing.interval: 60000
      execution.checkpointing.mode: EXACTLY_ONCE
      execution.checkpointing.min-pause: 30000
      heartbeat.interval: 10000
      heartbeat.timeout: 50000
      rest.flamegraph.enabled: true
      metrics.reporter.slf4j.class: org.apache.flink.metrics.slf4j.Slf4jReporter
      metrics.reporter.slf4j.interval: 60 SECONDS
  volumes:
    - flink_checkpoints:/flink-checkpoints

# ══════════════════════════════════════════════════════════════════════════════
services:

  # ── Kafka broker 1 (controller + broker) ──────────────────────────────────
  kafka-1:
    <<: *kafka-common
    container_name: kafka-1
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      <<: *kafka-env
      KAFKA_CFG_NODE_ID:              "1"
      KAFKA_CFG_LISTENERS:            "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-1:9092"
    volumes:
      - kafka_1_data:/bitnami/kafka

  # ── Kafka broker 2 ────────────────────────────────────────────────────────
  kafka-2:
    <<: *kafka-common
    container_name: kafka-2
    environment:
      <<: *kafka-env
      KAFKA_CFG_NODE_ID:              "2"
      KAFKA_CFG_LISTENERS:            "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-2:9092"
    volumes:
      - kafka_2_data:/bitnami/kafka

  # ── Kafka broker 3 ────────────────────────────────────────────────────────
  kafka-3:
    <<: *kafka-common
    container_name: kafka-3
    environment:
      <<: *kafka-env
      KAFKA_CFG_NODE_ID:              "3"
      KAFKA_CFG_LISTENERS:            "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-3:9092"
    volumes:
      - kafka_3_data:/bitnami/kafka

  # ── Topic + ACL bootstrap (idempotent, exits 0) ────────────────────────────
  kafka-init:
    image: bitnami/kafka:3.7
    container_name: kafka-init
    depends_on:
      kafka-1: { condition: service_healthy }
      kafka-2: { condition: service_healthy }
      kafka-3: { condition: service_healthy }
    command: bash /scripts/init-topics.sh
    volumes:
      - ./kafka/scripts/init-topics.sh:/scripts/init-topics.sh:ro
    environment:
      BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
    networks:
      - monitoring
    restart: "no"

  # ── Kafka UI ───────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    <<: *restart
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      kafka-1: { condition: service_healthy }
    environment:
      KAFKA_CLUSTERS_0_NAME:             local-3node
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      LOGGING_LEVEL_ROOT:                WARN
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - monitoring

  # ── LocalStack — S3 archive target ────────────────────────────────────────
  localstack:
    image: localstack/localstack:3.4
    container_name: localstack
    <<: *restart
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      SERVICES:                    s3
      DEBUG:                       "0"
      PERSISTENCE:                 "1"
      S3_SKIP_SIGNATURE_VALIDATION: "1"
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - monitoring

  # ── Kafka Connect (S3 sink) ────────────────────────────────────────────────
  kafka-connect:
    build:
      context: ./kafka/connect
      dockerfile: Dockerfile
    image: log-agent/kafka-connect:latest
    container_name: kafka-connect
    <<: *restart
    ports:
      - "127.0.0.1:8083:8083"
    depends_on:
      kafka-1:    { condition: service_healthy }
      kafka-2:    { condition: service_healthy }
      kafka-3:    { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }
      localstack: { condition: service_healthy }
    environment:
      CONNECT_BOOTSTRAP_SERVERS:                       kafka-1:9092,kafka-2:9092,kafka-3:9092
      CONNECT_REST_PORT:                               "8083"
      CONNECT_REST_ADVERTISED_HOST_NAME:               kafka-connect
      CONNECT_GROUP_ID:                                log-pipeline-connect-v1
      CONNECT_CONFIG_STORAGE_TOPIC:                    _connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC:                    _connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC:                    _connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR:       "3"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR:       "3"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR:       "3"
      CONNECT_OFFSET_STORAGE_PARTITIONS:               "25"
      CONNECT_STATUS_STORAGE_PARTITIONS:               "5"
      CONNECT_KEY_CONVERTER:                           org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER:                         org.apache.kafka.connect.converters.ByteArrayConverter
      CONNECT_INTERNAL_KEY_CONVERTER:                  org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_VALUE_CONVERTER:                org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_KEY_CONVERTER_SCHEMAS_ENABLE:   "false"
      CONNECT_INTERNAL_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH:                             /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_LOG4J_ROOT_LOGLEVEL:                     WARN
      AWS_ACCESS_KEY_ID:     test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION:    us-east-1
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - monitoring

  # ── Connector bootstrap (idempotent PUT, exits 0) ─────────────────────────
  connect-init:
    image: curlimages/curl:8.9.1
    container_name: connect-init
    user: root
    depends_on:
      kafka-connect: { condition: service_healthy }
      localstack:    { condition: service_healthy }
    environment:
      KAFKA_CONNECT_URL: http://kafka-connect:8083
      LOCALSTACK_URL:    http://localstack:4566
      S3_BUCKET:         log-archive
    volumes:
      - ./kafka/connect/deploy-connectors.sh:/deploy.sh:ro
      - ./kafka/connect:/connectors:ro
    command: sh /deploy.sh
    networks:
      - monitoring
    restart: "no"

  # ── Fluent Bit ─────────────────────────────────────────────────────────────
  fluent-bit:
    build:
      context: ./fluent-bit
      dockerfile: Dockerfile
    image: log-agent/fluent-bit:latest
    container_name: fluent-bit
    <<: *restart
    depends_on:
      kafka-1:    { condition: service_healthy }
      kafka-2:    { condition: service_healthy }
      kafka-3:    { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }
    ports:
      - "0.0.0.0:5170:5170/tcp"
      - "0.0.0.0:5171:5171/udp"
      - "0.0.0.0:5140:5140/tcp"
      - "127.0.0.1:2020:2020/tcp"
    environment:
      HOSTNAME:      ${HOSTNAME:-localhost}
      ENVIRONMENT:   ${ENVIRONMENT:-local}
      SERVICE_NAME:  ${SERVICE_NAME:-unknown}
      KAFKA_BROKERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      FLB_LOG_LEVEL: ${FLB_LOG_LEVEL:-info}
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./fluent-bit/lua:/fluent-bit/etc/lua:ro
      - app_logs:/var/log/app:ro
      - fluent_bit_state:/var/log/fluent-bit
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s
    networks:
      - monitoring

  # ── OpenSearch ─────────────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: opensearch
    <<: *restart
    environment:
      discovery.type:          single-node
      OPENSEARCH_JAVA_OPTS:    -Xms${OPENSEARCH_HEAP:-512m} -Xmx${OPENSEARCH_HEAP:-512m}
      DISABLE_SECURITY_PLUGIN: "true"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - monitoring

  # ── OpenSearch Dashboards ──────────────────────────────────────────────────
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: opensearch-dashboards
    <<: *restart
    ports:
      - "127.0.0.1:5601:5601"
    depends_on:
      opensearch: { condition: service_healthy }
    environment:
      OPENSEARCH_HOSTS:                  http://opensearch:9200
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5601/api/status"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - monitoring

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: redis
    <<: *restart
    command: >
      redis-server
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - monitoring

  # ── Flink JobManager ───────────────────────────────────────────────────────
  flink-jobmanager:
    <<: *flink-common
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "127.0.0.1:8081:8081"   # Flink Web UI + REST API
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Flink TaskManager ─────────────────────────────────────────────────────
  flink-taskmanager:
    <<: *flink-common
    container_name: flink-taskmanager
    command: taskmanager
    depends_on:
      flink-jobmanager: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://flink-jobmanager:8081/taskmanagers | grep -q '\"taskmanagers\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Flink job submission (one-shot, exits 0) ───────────────────────────────
  flink-job-submit:
    build:
      context: ./flink-log-processor
      dockerfile: Dockerfile
    image: log-agent/flink-log-processor:latest
    container_name: flink-job-submit
    depends_on:
      flink-taskmanager: { condition: service_healthy }
      kafka-init:        { condition: service_completed_successfully }
      opensearch:        { condition: service_healthy }
    # Submit the fat JAR to the JobManager REST API; exit once accepted.
    # Flink itself manages restarts — this container is not kept alive.
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Waiting for JobManager REST API..."
        until curl -sf http://flink-jobmanager:8081/overview >/dev/null; do sleep 2; done
        flink run \
          --jobmanager flink-jobmanager:8081 \
          --detached \
          /opt/flink/usrlib/flink-log-processor.jar \
          --kafka-brokers        kafka-1:9092,kafka-2:9092,kafka-3:9092 \
          --input-topic          raw-logs \
          --output-topic         processed-logs \
          --opensearch-url       http://opensearch:9200 \
          --consumer-group       flink-log-processor \
          --checkpoint-interval  60000
        echo "Flink job submitted successfully"
    environment:
      KAFKA_BROKERS:    kafka-1:9092,kafka-2:9092,kafka-3:9092
      OPENSEARCH_URL:   http://opensearch:9200
    networks:
      - monitoring
    restart: "no"

  # ── Anomaly Detector ──────────────────────────────────────────────────────
  anomaly-detector:
    build:
      context: ./anomaly-detector
      dockerfile: Dockerfile
    image: log-agent/anomaly-detector:latest
    container_name: anomaly-detector
    <<: *restart
    depends_on:
      kafka-1:    { condition: service_healthy }
      kafka-2:    { condition: service_healthy }
      kafka-3:    { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }
      redis:      { condition: service_healthy }
    environment:
      KAFKA_BROKERS:          kafka-1:9092,kafka-2:9092,kafka-3:9092
      KAFKA_INPUT_TOPIC:      processed-logs
      KAFKA_ANOMALY_TOPIC:    anomaly-events
      KAFKA_CONSUMER_GROUP:   anomaly-detector
      REDIS_URL:              redis://redis:6379
      PYTHONUNBUFFERED:       "1"
    healthcheck:
      # The anomaly-detector is a long-running consumer; it's alive if its
      # Python process is running and Redis is reachable.
      test: ["CMD-SHELL", "python -c \"import redis; redis.from_url('redis://redis:6379').ping()\" 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - monitoring

  # ── Incident Reporter ─────────────────────────────────────────────────────
  incident-reporter:
    build:
      context: ./incident-reporter
      dockerfile: Dockerfile
    image: log-agent/incident-reporter:latest
    container_name: incident-reporter
    <<: *restart
    depends_on:
      kafka-1:          { condition: service_healthy }
      kafka-2:          { condition: service_healthy }
      kafka-3:          { condition: service_healthy }
      kafka-init:       { condition: service_completed_successfully }
      opensearch:       { condition: service_healthy }
      redis:            { condition: service_healthy }
      anomaly-detector: { condition: service_healthy }
    environment:
      KAFKA_BROKERS:          kafka-1:9092,kafka-2:9092,kafka-3:9092
      KAFKA_ANOMALY_TOPIC:    anomaly-events
      KAFKA_CONSUMER_GROUP:   incident-reporter
      OPENSEARCH_URL:         http://opensearch:9200
      OPENSEARCH_USERNAME:    ${OPENSEARCH_USERNAME:-}
      OPENSEARCH_PASSWORD:    ${OPENSEARCH_PASSWORD:-}
      SERVICE_REGISTRY_PATH:  /app/service_registry.json
      ANTHROPIC_API_KEY:      ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      SLACK_BOT_TOKEN:        ${SLACK_BOT_TOKEN:-}
      PAGERDUTY_ROUTING_KEY:  ${PAGERDUTY_ROUTING_KEY:-}
      DASHBOARD_BASE_URL:     ${DASHBOARD_BASE_URL:-http://localhost:5601}
      PYTHONUNBUFFERED:       "1"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import redis; redis.from_url('redis://redis:6379').ping()\" 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - monitoring

  # ── Dashboard API ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: log-agent/api:latest
    container_name: log-monitor-api
    <<: *restart
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      kafka-1:    { condition: service_healthy }
      kafka-2:    { condition: service_healthy }
      kafka-3:    { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }
      redis:      { condition: service_healthy }
      opensearch: { condition: service_healthy }
    environment:
      OPENSEARCH_URL:            http://opensearch:9200
      OPENSEARCH_USERNAME:       ${OPENSEARCH_USERNAME:-}
      OPENSEARCH_PASSWORD:       ${OPENSEARCH_PASSWORD:-}
      REDIS_URL:                 redis://redis:6379
      SERVICE_REGISTRY_PATH:     /app/service_registry.json
      JWT_SECRET:                ${JWT_SECRET:?JWT_SECRET is required}
      RATE_LIMIT_REQUESTS:       ${RATE_LIMIT_REQUESTS:-100}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      KAFKA_BROKERS:             kafka-1:9092,kafka-2:9092,kafka-3:9092
      KAFKA_ANOMALY_TOPIC:       anomaly-events
      KAFKA_CONSUMER_GROUP_SSE:  api-sse
      PYTHONUNBUFFERED:          "1"
    volumes:
      - ./incident-reporter/service_registry.json:/app/service_registry.json:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - monitoring

  # ── Log Generator (dev / load-test only) ──────────────────────────────────
  log-generator:
    build:
      context: ./log-generator
      dockerfile: Dockerfile
    image: log-agent/log-generator:latest
    container_name: log-generator
    profiles:
      - loadtest                # not started by default; use: docker compose --profile loadtest up
    depends_on:
      fluent-bit: { condition: service_healthy }
    environment:
      FLUENT_BIT_TCP_HOST: fluent-bit
      FLUENT_BIT_TCP_PORT: "5170"
      SERVICE_NAME:        ${SERVICE_NAME:-test-service}
      LOG_RATE:            ${LOG_RATE:-200}
      LOG_DIR:             /var/log/app
    volumes:
      - app_logs:/var/log/app
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f log_generator >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    <<: *restart
    networks:
      - monitoring

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  kafka_1_data:      { driver: local }
  kafka_2_data:      { driver: local }
  kafka_3_data:      { driver: local }
  localstack_data:   { driver: local }
  fluent_bit_state:  { driver: local }
  app_logs:          { driver: local }
  opensearch_data:   { driver: local }
  redis_data:        { driver: local }
  flink_checkpoints: { driver: local }

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
